name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install & Build Client
        run: |
          cd mern/client
          npm install
          npm run build --if-present

      - name: Install Server
        run: |
          cd mern/server
          npm install
